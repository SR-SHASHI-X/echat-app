name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build WebView APK
        run: |
          git clone https://github.com/ashishb/android-webview-app.git
          cd android-webview-app
          sed -i 's|https://example.com|https://echat.unaux.com|g' app/src/main/res/values/strings.xml
          sed -i 's|WebViewApp|eChat|g' app/src/main/res/values/strings.xml
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: eChat-APK
          path: android-webview-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
