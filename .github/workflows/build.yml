name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build WebView APK
        run: |
          mkdir -p app/src/main/java/com/echat/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          pip install pillow -q
          python3 << 'PYEOF'
          from PIL import Image
          import urllib.request
          urllib.request.urlretrieve("https://raw.githubusercontent.com/SR-SHASHI-X/echat-app/main/logo.jpg", "logo.jpg")
          img = Image.open("logo.jpg").convert("RGBA")
          for folder, size in [("mdpi",48),("hdpi",72),("xhdpi",96),("xxhdpi",144),("xxxhdpi",192)]:
              r = img.resize((size,size), Image.LANCZOS)
              r.save(f"app/src/main/res/mipmap-{folder}/ic_launcher.png")
              r.save(f"app/src/main/res/mipmap-{folder}/ic_launcher_round.png")
          urllib.request.urlretrieve("https://raw.githubusercontent.com/SR-SHASHI-X/echat-app/main/splash.png", "splash.png")
          splash = Image.open("splash.png").convert("RGB")
          splash.save("app/src/main/res/drawable/splash.jpg", "JPEG", quality=95)
          print("Done!")
          PYEOF

          cat > settings.gradle << 'EOF2'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "EchatApp"
          include ':app'
          EOF2

          cat > build.gradle << 'EOF2'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF2

          cat > gradle.properties << 'EOF2'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF2

          cat > app/build.gradle << 'EOF2'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.echat.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.echat.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 5
                  versionName "1.4"
              }
              buildTypes {
                  release { minifyEnabled false; signingConfig signingConfigs.debug }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF2

          cat > app/src/main/AndroidManifest.xml << 'EOF2'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <application
                  android:label="eChat"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity android:name=".SplashActivity" android:exported="true"
                      android:screenOrientation="portrait"
                      android:theme="@style/SplashTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity" android:exported="false"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"/>
              </application>
          </manifest>
          EOF2

          cat > app/src/main/res/values/styles.xml << 'EOF2'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="SplashTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@drawable/splash</item>
                  <item name="android:statusBarColor">#000D1A</item>
                  <item name="android:navigationBarColor">#000D1A</item>
              </style>
          </resources>
          EOF2

          cat > app/src/main/res/layout/activity_splash.xml << 'EOF2'
          <?xml version="1.0" encoding="utf-8"?>
          <ImageView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:src="@drawable/splash"
              android:scaleType="fitXY"
              android:background="#000D1A"/>
          EOF2

          cat > app/src/main/java/com/echat/app/SplashActivity.java << 'EOF2'
          package com.echat.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Handler;
          public class SplashActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_splash);
                  new Handler().postDelayed(() -> {
                      startActivity(new Intent(this, MainActivity.class));
                      finish();
                  }, 2500);
              }
          }
          EOF2

          cat > app/src/main/java/com/echat/app/MainActivity.java << 'EOF2'
          package com.echat.app;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.webkit.CookieManager;
          import android.webkit.PermissionRequest;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.RelativeLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              WebView webView;
              ImageView loadingView;
              LinearLayout offlineBanner;
              ValueCallback<Uri[]> filePathCallback;
              static final int FILE_CHOOSER = 100;
              static final String URL = "https://echat.unaux.com/app.html";
              long backPressedTime = 0;
              Toast backToast;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  RelativeLayout layout = new RelativeLayout(this);

                  webView = new WebView(this);
                  webView.setVisibility(View.INVISIBLE);
                  RelativeLayout.LayoutParams fullParams = new RelativeLayout.LayoutParams(
                      RelativeLayout.LayoutParams.MATCH_PARENT,
                      RelativeLayout.LayoutParams.MATCH_PARENT);
                  layout.addView(webView, fullParams);

                  loadingView = new ImageView(this);
                  loadingView.setImageResource(R.drawable.splash);
                  loadingView.setScaleType(ImageView.ScaleType.FIT_XY);
                  layout.addView(loadingView, fullParams);

                  offlineBanner = new LinearLayout(this);
                  offlineBanner.setOrientation(LinearLayout.HORIZONTAL);
                  offlineBanner.setGravity(Gravity.CENTER);
                  offlineBanner.setBackgroundColor(0xFFD32F2F);
                  offlineBanner.setPadding(0, dp(6), 0, dp(6));
                  offlineBanner.setVisibility(View.GONE);
                  TextView offlineText = new TextView(this);
                  offlineText.setText("No internet connection");
                  offlineText.setTextColor(0xFFFFFFFF);
                  offlineText.setTextSize(14);
                  offlineBanner.addView(offlineText);
                  RelativeLayout.LayoutParams bannerParams = new RelativeLayout.LayoutParams(
                      RelativeLayout.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                  bannerParams.addRule(RelativeLayout.ALIGN_PARENT_TOP);
                  layout.addView(offlineBanner, bannerParams);

                  setContentView(layout);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  s.setBuiltInZoomControls(false);
                  s.setLoadsImagesAutomatically(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);

                  CookieManager.getInstance().setAcceptCookie(true);
                  CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);

                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  webView.setOverScrollMode(View.OVER_SCROLL_NEVER);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageStarted(WebView view, String url, Bitmap favicon) {
                          loadingView.setVisibility(View.VISIBLE);
                          webView.setVisibility(View.INVISIBLE);
                      }
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          loadingView.setVisibility(View.GONE);
                          webView.setVisibility(View.VISIBLE);
                          CookieManager.getInstance().flush();
                          updateOfflineBanner();
                      }
                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request, android.webkit.WebResourceError error) {
                          if (request.isForMainFrame()) {
                              loadingView.setVisibility(View.GONE);
                              webView.setVisibility(View.VISIBLE);
                              offlineBanner.setVisibility(View.VISIBLE);
                          }
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                      @Override
                      public boolean onShowFileChooser(WebView view,
                              ValueCallback<Uri[]> callback,
                              FileChooserParams params) {
                          if (filePathCallback != null) filePathCallback.onReceiveValue(null);
                          filePathCallback = callback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("image/*");
                          startActivityForResult(Intent.createChooser(intent, "Choose Image"), FILE_CHOOSER);
                          return true;
                      }
                  });

                  webView.loadUrl(URL);
              }

              private int dp(int v) {
                  return (int) (v * getResources().getDisplayMetrics().density);
              }

              private boolean isNetworkAvailable() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  if (cm == null) return false;
                  NetworkInfo info = cm.getActiveNetworkInfo();
                  return info != null && info.isConnected();
              }

              private void updateOfflineBanner() {
                  offlineBanner.setVisibility(isNetworkAvailable() ? View.GONE : View.VISIBLE);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILE_CHOOSER && filePathCallback != null) {
                      Uri[] results = null;
                      if (resultCode == RESULT_OK && data != null && data.getData() != null)
                          results = new Uri[]{data.getData()};
                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
                  super.onActivityResult(requestCode, resultCode, data);
              }

              @Override
              public boolean onKeyDown(int k, KeyEvent e) {
                  if (k == KeyEvent.KEYCODE_BACK) {
                      if (webView.canGoBack()) {
                          webView.goBack();
                          return true;
                      } else {
                          if (backPressedTime + 2000 > System.currentTimeMillis()) {
                              if (backToast != null) backToast.cancel();
                              finish();
                          } else {
                              backToast = Toast.makeText(this, "Press back again to exit", Toast.LENGTH_SHORT);
                              backToast.show();
                          }
                          backPressedTime = System.currentTimeMillis();
                          return true;
                      }
                  }
                  return super.onKeyDown(k, e);
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  webView.onResume();
                  updateOfflineBanner();
              }
              @Override protected void onPause() { super.onPause(); webView.onPause(); }
              @Override protected void onDestroy() { webView.destroy(); super.onDestroy(); }
          }
          EOF2

          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: eChat-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
