name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build WebView APK
        run: |
          wget -q https://github.com/rajashekhar9121/android-webview/archive/refs/heads/master.zip
          unzip -q master.zip
          cd android-webview-master
          find . -name "*.xml" -exec sed -i 's|https://rajashekhar.in|https://echat.unaux.com|g' {} \;
          find . -name "*.java" -exec sed -i 's|https://rajashekhar.in|https://echat.unaux.com|g' {} \;
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: eChat-APK
          path: android-webview-master/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
